<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Physiosetu Conference</title>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
:root {
  --teal: #0F6E56; --teal-mid: #1D9E75; --teal-light: #E1F5EE;
  --amber: #BA7517; --amber-light: #FAEEDA;
  --red: #A32D2D; --red-light: #FCEBEB;
  --green: #3B6D11; --green-light: #EAF3DE;
  --purple: #6B3FA0; --purple-light: #F0E8FF;
  --blue: #1A5FA0; --blue-light: #E8F0FF;
  --gray: #5F5E5A; --gray-light: #F1EFE8;
  --bg: #f2f1ed; --white: #ffffff;
  --border: rgba(0,0,0,0.1); --text: #1a1a18; --muted: #888780;
  --r: 16px; --bnav: 68px; --hdr: 58px;
  --safebot: env(safe-area-inset-bottom, 0px);
  --safetop: env(safe-area-inset-top, 0px);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; background: var(--bg); }
body { font-family: -apple-system, 'SF Pro Text', 'Segoe UI', system-ui, sans-serif; color: var(--text); overscroll-behavior: none; }

/* ─ HEADER ─ */
.hdr {
position: fixed; top: 0; left: 0; right: 0; z-index: 50;
background: var(–teal);
height: calc(var(–hdr) + var(–safetop));
padding-top: var(–safetop);
display: flex; align-items: center; justify-content: space-between;
padding-left: 16px; padding-right: 16px;
box-shadow: 0 1px 0 rgba(0,0,0,0.12);
}
.hdr-left { display: flex; align-items: center; gap: 10px; }
.hdr-logo { width: 36px; height: 36px; border-radius: 9px; background: rgba(255,255,255,0.2); display: flex; align-items: center; justify-content: center; font-size: 17px; font-weight: 800; color: white; }
.hdr-title { font-size: 16px; font-weight: 700; color: white; line-height: 1.2; }
.hdr-sub { font-size: 11px; color: rgba(255,255,255,0.7); }
.hdr-add { background: rgba(255,255,255,0.18); border: none; color: white; padding: 8px 14px; border-radius: 20px; font-size: 13px; font-weight: 700; cursor: pointer; }

/* ─ SCROLL AREA ─ */
.canvas {
position: fixed;
top: calc(var(–hdr) + var(–safetop));
left: 0; right: 0;
bottom: calc(var(–bnav) + var(–safebot));
overflow-y: auto;
-webkit-overflow-scrolling: touch;
}
.pg { display: none; }
.pg.on { display: block; }

/* ─ BOTTOM NAV ─ */
.bnav {
position: fixed; bottom: 0; left: 0; right: 0; z-index: 50;
height: calc(var(–bnav) + var(–safebot));
padding-bottom: var(–safebot);
background: white; border-top: 1px solid var(–border);
display: flex; box-shadow: 0 -2px 12px rgba(0,0,0,0.06);
}
.ni { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; cursor: pointer; background: none; border: none; color: var(–muted); padding: 8px 0; }
.ni.on { color: var(–teal); }
.ni-ico { font-size: 23px; line-height: 1; }
.ni-lbl { font-size: 10px; font-weight: 700; letter-spacing: 0.3px; }

/* ─ DAY TABS ─ */
.day-tabs {
display: flex; background: white; border-bottom: 2px solid var(–border);
position: sticky; top: 0; z-index: 10;
}
.day-tab {
flex: 1; padding: 12px 8px; text-align: center; cursor: pointer;
font-size: 13px; font-weight: 700; color: var(–muted);
border-bottom: 3px solid transparent; margin-bottom: -2px;
transition: all 0.2s;
}
.day-tab.on { color: var(–teal); border-bottom-color: var(–teal); }

/* ─ SCAN PAGE ─ */
.mode-bar { display: flex; gap: 6px; padding: 10px 10px; background: white; border-bottom: 1px solid var(–border); overflow-x: auto; }
.mode-bar::-webkit-scrollbar { display: none; }
.mchip { flex-shrink: 0; padding: 9px 10px; border-radius: 11px; border: 1.5px solid var(–border); font-size: 11px; font-weight: 700; text-align: center; cursor: pointer; color: var(–muted); background: var(–gray-light); transition: all 0.15s; white-space: nowrap; }
.mchip.on { background: var(–teal-light); border-color: var(–teal); color: var(–teal); }

#qr-reader { width: 100%; background: #111; min-height: 220px; }
#qr-reader video { width: 100% !important; display: block; }

.scan-footer { padding: 12px 14px; background: white; border-top: 1px solid var(–border); display: flex; gap: 10px; }
.scan-toast { margin: 10px 14px; padding: 14px 16px; border-radius: 14px; display: none; animation: su 0.22s ease; }
.scan-toast.ok { background: var(–green-light); border: 1.5px solid #afd073; }
.scan-toast.warn { background: var(–amber-light); border: 1.5px solid #f0c97a; }
.scan-toast.err { background: var(–red-light); border: 1.5px solid #e28888; }
.t-name { font-size: 17px; font-weight: 800; margin-bottom: 3px; }
.t-detail { font-size: 13px; }
.scan-toast.ok .t-name { color: var(–green); }
.scan-toast.warn .t-name { color: var(–amber); }
.scan-toast.err .t-name { color: var(–red); }

.sec-lbl { font-size: 11px; font-weight: 800; color: var(–muted); text-transform: uppercase; letter-spacing: 0.7px; padding: 12px 14px 6px; }
.s-item { display: flex; align-items: center; gap: 12px; padding: 12px 14px; background: white; border-bottom: 1px solid var(–border); }
.ava { width: 40px; height: 40px; border-radius: 50%; flex-shrink: 0; background: var(–teal); display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 800; color: white; }
.s-info { flex: 1; min-width: 0; }
.s-name { font-size: 14px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.s-meta { font-size: 12px; color: var(–muted); margin-top: 2px; }

/* ─ ATTENDEES ─ */
.srch-wrap { padding: 10px 14px; background: white; border-bottom: 1px solid var(–border); position: sticky; top: 0; z-index: 5; }
.srch-inner { position: relative; }
.srch-inner input { width: 100%; padding: 11px 12px 11px 36px; border-radius: 12px; border: 1.5px solid var(–border); font-size: 15px; background: var(–gray-light); color: var(–text); outline: none; -webkit-appearance: none; }
.srch-inner input:focus { border-color: var(–teal); background: white; }
.srch-ico { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); font-size: 15px; }
.flt-scroll { display: flex; gap: 8px; overflow-x: auto; padding: 8px 14px; background: white; border-bottom: 1px solid var(–border); }
.flt-scroll::-webkit-scrollbar { display: none; }
.fpill { white-space: nowrap; padding: 7px 15px; border-radius: 20px; font-size: 12px; font-weight: 700; border: 1.5px solid var(–border); background: var(–gray-light); color: var(–muted); cursor: pointer; }
.fpill.on { background: var(–teal); color: white; border-color: var(–teal); }

.arow { display: flex; align-items: center; gap: 12px; padding: 14px; background: white; border-bottom: 1px solid var(–border); cursor: pointer; }
.arow:active { background: #f5f4f0; }
.aava { width: 46px; height: 46px; border-radius: 50%; flex-shrink: 0; background: var(–teal); display: flex; align-items: center; justify-content: center; font-size: 15px; font-weight: 800; color: white; }
.abody { flex: 1; min-width: 0; }
.aname { font-size: 15px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.ameta { font-size: 12px; color: var(–muted); margin-top: 2px; }
.adots { display: flex; flex-direction: column; gap: 4px; align-items: flex-end; }
.dotrow { display: flex; gap: 4px; align-items: center; font-size: 10px; color: var(–muted); }
.dot { width: 9px; height: 9px; border-radius: 50%; }
.dg { background: var(–teal-mid); } .dr { background: #e24b4a; }

/* ─ DASHBOARD ─ */
.stat-strip { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 12px 14px; }
.stile { background: white; border-radius: 14px; border: 1px solid var(–border); padding: 14px; text-align: center; }
.snum { font-size: 36px; font-weight: 900; line-height: 1; margin-bottom: 4px; }
.slbl { font-size: 11px; font-weight: 700; color: var(–muted); }
.stile.t .snum { color: var(–teal); } .stile.a .snum { color: var(–amber); }
.stile.r .snum { color: var(–red); } .stile.g .snum { color: var(–green); }
.dcard { background: white; border-radius: var(–r); border: 1px solid var(–border); margin: 0 14px 12px; padding: 14px 16px; }
.dtitle { font-size: 12px; font-weight: 800; color: var(–muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px; }
.prow { margin-bottom: 14px; }
.ptop { display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 5px; font-weight: 500; }
.ptop b { font-weight: 800; }
.pbar { height: 10px; background: var(–gray-light); border-radius: 5px; overflow: hidden; }
.pfill { height: 100%; border-radius: 5px; transition: width 0.5s; }

/* ─ LOG ─ */
.lrow { display: flex; gap: 12px; padding: 12px 14px; background: white; border-bottom: 1px solid var(–border); }
.lico { font-size: 20px; flex-shrink: 0; width: 26px; text-align: center; }
.lbody { flex: 1; min-width: 0; }
.ltitle { font-size: 14px; font-weight: 700; }
.lsub { font-size: 12px; color: var(–muted); margin-top: 2px; }
.ltime { font-size: 11px; color: var(–muted); margin-top: 2px; }

/* ─ BUTTONS ─ */
.btn { padding: 14px; border-radius: 13px; font-size: 15px; font-weight: 700; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 7px; transition: transform 0.1s; }
.btn:active { transform: scale(0.96); }
.btn-p { background: var(–teal); color: white; }
.btn-s { background: var(–gray-light); color: var(–gray); }
.btn-row { display: flex; gap: 10px; }
.btn-row .btn { flex: 1; }

/* ─ BADGE ─ */
.bdg { display: inline-flex; align-items: center; padding: 3px 8px; border-radius: 20px; font-size: 11px; font-weight: 800; }
.bt { background: var(–teal-light); color: var(–teal); }
.ba { background: var(–amber-light); color: var(–amber); }
.br { background: var(–red-light); color: var(–red); }

/* ─ BOTTOM SHEET ─ */
.ovl { position: fixed; inset: 0; background: rgba(0,0,0,0); z-index: 100; display: none; transition: background 0.28s; }
.ovl.on { display: block; background: rgba(0,0,0,0.42); }
.sht {
position: fixed; bottom: 0; left: 0; right: 0; z-index: 101;
background: white; border-radius: 22px 22px 0 0;
transform: translateY(105%); transition: transform 0.3s cubic-bezier(0.32,0,0.15,1);
max-height: 92vh; overflow-y: auto;
padding-bottom: calc(24px + var(–safebot));
}
.sht.on { transform: translateY(0); }
.shandle { width: 38px; height: 4px; background: #ddd; border-radius: 2px; margin: 12px auto 4px; }
.shdr { padding: 8px 20px 14px; border-bottom: 1px solid var(–border); }
.shdr h2 { font-size: 19px; font-weight: 800; }
.shdr p { font-size: 13px; color: var(–muted); margin-top: 3px; }
.sbody { padding: 16px 20px; }

/* ─ FORM ─ */
.fg { margin-bottom: 14px; }
.fl { font-size: 11px; font-weight: 800; color: var(–muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; display: block; }
.fi { width: 100%; padding: 13px 14px; border-radius: 12px; border: 1.5px solid var(–border); font-size: 16px; color: var(–text); background: var(–gray-light); outline: none; -webkit-appearance: none; transition: border 0.15s, background 0.15s; }
.fi:focus { border-color: var(–teal); background: white; }
.frow { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

/* ─ DETAIL ─ */
.detail-day-section { margin-bottom: 14px; }
.detail-day-label { font-size: 12px; font-weight: 800; color: var(–muted); text-transform: uppercase; letter-spacing: 0.5px; padding: 10px 0 8px; border-bottom: 1px solid var(–border); margin-bottom: 10px; }
.slot-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
.slot-tile { padding: 12px 10px; border-radius: 12px; border: 1.5px solid; text-align: center; cursor: pointer; transition: transform 0.1s; }
.slot-tile:active { transform: scale(0.96); }
.slot-tile.done { opacity: 1; }
.slot-tile.pending { opacity: 0.85; }
.slot-ico { font-size: 20px; margin-bottom: 4px; }
.slot-name { font-size: 11px; font-weight: 800; }
.slot-time { font-size: 10px; margin-top: 3px; opacity: 0.75; }
.actrow { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 10px; }
.abtn { flex: 1; min-width: 130px; padding: 14px 10px; border-radius: 13px; font-size: 13px; font-weight: 800; text-align: center; cursor: pointer; border: 2px solid; display: flex; align-items: center; justify-content: center; gap: 6px; transition: transform 0.1s; }
.abtn:active { transform: scale(0.96); }
.am { background: var(–amber-light); border-color: var(–amber); color: var(–amber); }
.ac { background: var(–teal-light); border-color: var(–teal); color: var(–teal); }
.au { background: var(–red-light); border-color: #e28888; color: var(–red); }

/* ─ QR ─ */
#qr-disp { display: flex; justify-content: center; padding: 20px 0 10px; }

/* ─ ANIMS ─ */
@keyframes su { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
.empty { text-align: center; padding: 52px 20px; color: var(–muted); }
.empty-ico { font-size: 52px; margin-bottom: 14px; }
.empty p { font-size: 14px; }
</style>

</head>
<body>

<!-- HEADER -->

<div class="hdr">
  <div class="hdr-left">
    <div class="hdr-logo">P</div>
    <div>
      <div class="hdr-title">Physiosetu 2025</div>
      <div class="hdr-sub">Conference Portal</div>
    </div>
  </div>
  <button class="hdr-add" onclick="openSheet('add')">+ Add</button>
</div>

<!-- PAGES -->

<div class="canvas">

  <!-- SCAN -->

  <div class="pg on" id="pg-scan">
    <div class="day-tabs">
      <div class="day-tab on" id="scan-d1" onclick="setScanDay(1)">📅 Day 1</div>
      <div class="day-tab" id="scan-d2" onclick="setScanDay(2)">📅 Day 2</div>
    </div>
    <div class="mode-bar" id="mode-bar"></div>
    <div id="qr-reader"></div>
    <div class="scan-toast" id="toast"></div>
    <div class="scan-footer">
      <button class="btn btn-p" id="sbtn" onclick="startScan()" style="flex:1">▶ Start Camera</button>
      <button class="btn btn-s" id="xbtn" onclick="stopScan()" style="display:none;flex:0 0 auto;padding:14px 18px">⏹</button>
      <button class="btn btn-s" onclick="openSheet('lookup')" style="flex:0 0 auto;padding:14px 18px">🔎</button>
    </div>
    <div class="sec-lbl">Recent Scans</div>
    <div id="recent"></div>
  </div>

  <!-- ATTENDEES -->

  <div class="pg" id="pg-attendees">
    <div class="srch-wrap">
      <div class="srch-inner">
        <span class="srch-ico">🔍</span>
        <input type="search" id="asrch" placeholder="Search name, ID, email…" oninput="renderAtt()">
      </div>
    </div>
    <div class="flt-scroll">
      <div class="fpill on" onclick="setFlt('all',this)">All</div>
      <div class="fpill" onclick="setFlt('pending',this)">Has Pending</div>
      <div class="fpill" onclick="setFlt('done',this)">Complete</div>
      <div class="fpill" onclick="setFlt('d1',this)">Day 1 Done</div>
      <div class="fpill" onclick="setFlt('d2',this)">Day 2 Done</div>
    </div>
    <div id="attlist"></div>
  </div>

  <!-- DASHBOARD -->

  <div class="pg" id="pg-dashboard">
    <div class="day-tabs">
      <div class="day-tab on" id="dash-d1" onclick="setDashDay(1)">📅 Day 1</div>
      <div class="day-tab" id="dash-d2" onclick="setDashDay(2)">📅 Day 2</div>
      <div class="day-tab" id="dash-all" onclick="setDashDay(0)">📊 Overall</div>
    </div>
    <div id="dash-content"></div>
  </div>

  <!-- LOG -->

  <div class="pg" id="pg-log">
    <div class="srch-wrap">
      <div class="srch-inner">
        <span class="srch-ico">🔍</span>
        <input type="search" id="lsrch" placeholder="Search log…" oninput="renderLog()">
      </div>
    </div>
    <div id="loglist"></div>
  </div>

</div>

<!-- BOTTOM NAV -->

<div class="bnav">
  <button class="ni on" id="ni-scan" onclick="nav('scan',this)"><span class="ni-ico">📷</span><span class="ni-lbl">Scan</span></button>
  <button class="ni" id="ni-attendees" onclick="nav('attendees',this)"><span class="ni-ico">👥</span><span class="ni-lbl">Attendees</span></button>
  <button class="ni" id="ni-dashboard" onclick="nav('dashboard',this)"><span class="ni-ico">📊</span><span class="ni-lbl">Stats</span></button>
  <button class="ni" id="ni-log" onclick="nav('log',this)"><span class="ni-ico">📋</span><span class="ni-lbl">Log</span></button>
</div>

<!-- SHEETS -->

<!-- ADD -->

<div class="ovl" id="ovl-add" onclick="closeSheet('add')"></div>
<div class="sht" id="sht-add">
  <div class="shandle"></div>
  <div class="shdr"><h2>Add Attendee</h2><p>Register and generate badge QR</p></div>
  <div class="sbody">
    <div class="fg"><label class="fl">Full Name *</label><input class="fi" id="nn" placeholder="Dr. / Mr. / Ms. …" type="text"></div>
    <div class="frow">
      <div class="fg"><label class="fl">ID *</label><input class="fi" id="ni2" placeholder="ATT001" type="text"></div>
      <div class="fg"><label class="fl">Category</label>
        <select class="fi" id="nc">
          <option>Physiotherapist</option><option>Student</option><option>Faculty</option>
          <option>Speaker</option><option>Sponsor</option><option>Other</option>
        </select>
      </div>
    </div>
    <div class="fg"><label class="fl">Email</label><input class="fi" id="ne" placeholder="email@example.com" type="email"></div>
    <div class="fg"><label class="fl">Phone</label><input class="fi" id="np" placeholder="Mobile number" type="tel"></div>
    <div class="btn-row">
      <button class="btn btn-p" onclick="addAtt()">Add & Generate QR</button>
      <button class="btn btn-s" style="flex:0 0 auto;padding:14px 18px" onclick="closeSheet('add')">✕</button>
    </div>
  </div>
</div>

<!-- LOOKUP -->

<div class="ovl" id="ovl-lookup" onclick="closeSheet('lookup')"></div>
<div class="sht" id="sht-lookup">
  <div class="shandle"></div>
  <div class="shdr"><h2>Manual Lookup</h2><p>Find attendee by name or ID</p></div>
  <div class="sbody">
    <div class="fg"><input class="fi" id="lq" placeholder="ATT001 or Dr. Sharma…" type="search" oninput="doLookup()"></div>
    <div id="lres"></div>
  </div>
</div>

<!-- DETAIL -->

<div class="ovl" id="ovl-detail" onclick="closeSheet('detail')"></div>
<div class="sht" id="sht-detail"><div class="shandle"></div><div id="det-inner" style="padding:0 20px 20px"></div></div>

<!-- QR -->

<div class="ovl" id="ovl-qr" onclick="closeSheet('qr')"></div>
<div class="sht" id="sht-qr">
  <div class="shandle"></div>
  <div style="padding:0 20px 20px">
    <div class="shdr" style="padding:6px 0 14px"><h2 id="qrname">QR Code</h2><p id="qrsub"></p></div>
    <div id="qr-disp"></div>
    <div class="btn-row" style="margin-top:6px">
      <button class="btn btn-p" onclick="printQR()">🖨️ Print QR</button>
      <button class="btn btn-s" style="flex:0 0 auto;padding:14px 18px" onclick="closeSheet('qr')">✕</button>
    </div>
  </div>
</div>

<script>
// ─── SLOT DEFINITIONS ───
const SLOTS = {
  d1: [
    { key:'d1_regkit',  label:'Reg & Delegate Kit', ico:'📋🎒', color:'var(--blue)',    bg:'var(--blue-light)'  },
    { key:'d1_bfast',   label:'Breakfast',           ico:'🍳',   color:'var(--amber)',   bg:'var(--amber-light)' },
    { key:'d1_lunch',   label:'Lunch',               ico:'🍱',   color:'var(--teal)',    bg:'var(--teal-light)'  },
    { key:'d1_hightea', label:'High Tea',             ico:'☕',   color:'var(--green)',   bg:'var(--green-light)' },
    { key:'d1_dinner',  label:'Dinner',               ico:'🍽️',  color:'var(--red)',     bg:'var(--red-light)'   },
  ],
  d2: [
    { key:'d2_bfast',   label:'Breakfast',       ico:'🍳', color:'var(--amber)',   bg:'var(--amber-light)' },
    { key:'d2_lunch',   label:'Lunch',           ico:'🍱', color:'var(--teal)',    bg:'var(--teal-light)'  },
    { key:'d2_cert',    label:'Certificate',     ico:'🎓', color:'var(--purple)',  bg:'var(--purple-light)'},
    { key:'d2_hightea', label:'High Tea',        ico:'☕', color:'var(--green)',   bg:'var(--green-light)' },
  ]
};
const ALL_SLOTS = [...SLOTS.d1, ...SLOTS.d2];

function emptySlots() {
  const o = {};
  ALL_SLOTS.forEach(s => { o[s.key] = false; o[s.key+'_time'] = null; });
  return o;
}

// ─── DATA ───
let atts = JSON.parse(localStorage.getItem('ps3_a')||'[]');
let logs = JSON.parse(localStorage.getItem('ps3_l')||'[]');
let recents = [], scanDay = 1, dashDay = 1, scanMode = 'd1_bfast', flt = 'all';
let scanner = null, detId = null, lastId='', lastT=0;

// Migrate old data or seed demo
if (!atts.length) {
  [['Dr. Anjali Sharma','Physiotherapist'],['Dr. Rahul Mehta','Speaker'],
   ['Ms. Priya Patil','Student'],['Dr. Suresh Kumar','Faculty'],
   ['Mr. Vikram Joshi','Physiotherapist'],['Dr. Neha Desai','Physiotherapist'],
   ['Ms. Kavya Rao','Student'],['Dr. Anil Nair','Speaker'],
   ['Mr. Sanjay Gupta','Sponsor'],['Dr. Manisha Singh','Faculty']
  ].forEach(([name,cat],i) => {
    const s = emptySlots();
    atts.push({ id:`ATT${String(i+1).padStart(3,'0')}`, name, category:cat,
      email: name.toLowerCase().replace(/[^a-z]/g,'').slice(0,8)+'@email.com',
      phone: `98${Math.floor(10000000+Math.random()*89999999)}`,
      added: new Date().toISOString(), ...s });
  });
  sv();
}

function sv() { localStorage.setItem('ps3_a',JSON.stringify(atts)); localStorage.setItem('ps3_l',JSON.stringify(logs)); }
function ini(n) { return n.split(' ').filter(Boolean).slice(0,2).map(w=>w[0].toUpperCase()).join(''); }
function ft(iso) {
  if(!iso) return '—';
  const d=new Date(iso);
  return d.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',hour12:true})+' · '+d.toLocaleDateString('en-IN',{day:'2-digit',month:'short'});
}
function lg(id,action,note='') { logs.unshift({time:new Date().toISOString(),attendeeId:id,action,note}); sv(); }
function vib(ms) { try{navigator.vibrate?.(ms);}catch(e){} }

// ─── SCAN DAY / MODE ───
function setScanDay(d) {
  scanDay = d;
  document.getElementById('scan-d1').classList.toggle('on', d===1);
  document.getElementById('scan-d2').classList.toggle('on', d===2);
  renderModeBar();
}

function renderModeBar() {
  const slots = SLOTS['d'+scanDay];
  const bar = document.getElementById('mode-bar');
  bar.innerHTML = slots.map(s =>
    `<div class="mchip ${scanMode===s.key?'on':''}" onclick="setScanMode('${s.key}')">${s.ico} ${s.label}</div>`
  ).join('');
}

function setScanMode(key) {
  scanMode = key;
  renderModeBar();
}

// ─── SCAN ───
function startScan() {
  document.getElementById('sbtn').style.display='none';
  document.getElementById('xbtn').style.display='';
  scanner = new Html5Qrcode('qr-reader');
  scanner.start({facingMode:'environment'},{fps:12,qrbox:{width:240,height:240}},onQR,()=>{}).catch(()=>{
    toast('err','Camera Error','Could not access camera. Use 🔎 lookup.'); stopScan();
  });
}
function stopScan() {
  if(scanner){scanner.stop().catch(()=>{});scanner=null;}
  document.getElementById('sbtn').style.display='';
  document.getElementById('xbtn').style.display='none';
}
function onQR(txt) {
  const now=Date.now(); if(txt===lastId&&now-lastT<3000) return;
  lastId=txt; lastT=now; processId(txt.trim());
}
function processId(id) {
  const a = atts.find(x=>x.id.toLowerCase()===id.toLowerCase());
  if(!a){ vib([60,30,60]); toast('err','❌ Not Found',`No attendee: ${id}`); return; }
  const slot = ALL_SLOTS.find(s=>s.key===scanMode);
  if(!slot) return;
  if(a[slot.key]) {
    vib([80,40,80,40,80]);
    toast('warn', `⚠️ Already Done`, `${slot.ico} ${slot.label} already collected at ${ft(a[slot.key+'_time'])}`);
  } else {
    a[slot.key] = true;
    a[slot.key+'_time'] = new Date().toISOString();
    lg(a.id, slot.key.toUpperCase(), `${slot.label}: ${a.name}`);
    sv(); vib(80);
    toast('ok', `✅ ${a.name}`, `${slot.ico} ${slot.label} marked`);
  }
  recents.unshift({a:{...a}, time:new Date().toISOString(), slot});
  if(recents.length>8) recents.pop();
  renderRecent();
}

function toast(type,title,detail) {
  const t=document.getElementById('toast');
  t.className=`scan-toast ${type}`;
  t.innerHTML=`<div class="t-name">${title}</div><div class="t-detail">${detail}</div>`;
  t.style.display='block';
  clearTimeout(t._t);
  t._t=setTimeout(()=>t.style.display='none',5000);
}

function renderRecent() {
  const el=document.getElementById('recent');
  if(!recents.length){el.innerHTML='<div class="empty"><div class="empty-ico">📷</div><p>Start scanning</p></div>';return;}
  el.innerHTML=recents.map(s=>`
    <div class="s-item">
      <div class="ava">${ini(s.a.name)}</div>
      <div class="s-info">
        <div class="s-name">${s.a.name}</div>
        <div class="s-meta">${s.a.id} · ${s.a.category}</div>
        <div class="s-meta">${s.slot.ico} ${s.slot.label}</div>
      </div>
    </div>`).join('');
}

// ─── LOOKUP ───
function doLookup() {
  const q=document.getElementById('lq').value.toLowerCase(), r=document.getElementById('lres');
  if(!q){r.innerHTML='';return;}
  const m=atts.filter(a=>a.id.toLowerCase().includes(q)||a.name.toLowerCase().includes(q)).slice(0,6);
  if(!m.length){r.innerHTML='<p style="text-align:center;color:var(--muted);padding:16px 0">No matches</p>';return;}
  r.innerHTML=m.map(a=>`
    <div style="display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)">
      <div class="ava" style="width:40px;height:40px;font-size:13px">${ini(a.name)}</div>
      <div style="flex:1;min-width:0"><div style="font-weight:700;font-size:14px">${a.name}</div>
        <div style="font-size:12px;color:var(--muted)">${a.id} · ${a.category}</div></div>
      <div style="display:flex;gap:6px">
        <button class="btn btn-p" style="padding:9px 14px;font-size:12px" onclick="closeSheet('lookup');processId('${a.id}')">Mark</button>
        <button class="btn btn-s" style="padding:9px 14px;font-size:12px" onclick="closeSheet('lookup');openDet('${a.id}')">View</button>
      </div>
    </div>`).join('');
}

// ─── ATTENDEES ───
function setFlt(f,el) {
  flt=f;
  document.querySelectorAll('.fpill').forEach(p=>p.classList.remove('on'));
  el.classList.add('on');
  renderAtt();
}
function isComplete(a) { return ALL_SLOTS.every(s=>a[s.key]); }
function isD1Done(a) { return SLOTS.d1.every(s=>a[s.key]); }
function isD2Done(a) { return SLOTS.d2.every(s=>a[s.key]); }
function hasPending(a) { return ALL_SLOTS.some(s=>!a[s.key]); }

function renderAtt() {
  const q=(document.getElementById('asrch')?.value||'').toLowerCase();
  let list=atts.filter(a=>!q||a.name.toLowerCase().includes(q)||a.id.toLowerCase().includes(q)||a.email?.toLowerCase().includes(q));
  if(flt==='pending') list=list.filter(hasPending);
  if(flt==='done') list=list.filter(isComplete);
  if(flt==='d1') list=list.filter(isD1Done);
  if(flt==='d2') list=list.filter(isD2Done);
  const el=document.getElementById('attlist');
  if(!list.length){el.innerHTML='<div class="empty"><div class="empty-ico">👥</div><p>No attendees found</p></div>';return;}
  el.innerHTML=list.map(a=>{
    const d1done = SLOTS.d1.filter(s=>a[s.key]).length;
    const d2done = SLOTS.d2.filter(s=>a[s.key]).length;
    return `<div class="arow" onclick="openDet('${a.id}')">
      <div class="aava">${ini(a.name)}</div>
      <div class="abody">
        <div class="aname">${a.name}</div>
        <div class="ameta">${a.id} · ${a.category}</div>
      </div>
      <div class="adots">
        <div class="dotrow"><span style="font-size:9px">D1</span>
          <div style="display:flex;gap:2px">${SLOTS.d1.map(s=>`<div class="dot ${a[s.key]?'dg':'dr'}" title="${s.label}"></div>`).join('')}</div>
        </div>
        <div class="dotrow"><span style="font-size:9px">D2</span>
          <div style="display:flex;gap:2px">${SLOTS.d2.map(s=>`<div class="dot ${a[s.key]?'dg':'dr'}" title="${s.label}"></div>`).join('')}</div>
        </div>
      </div>
    </div>`;
  }).join('');
}

// ─── ADD ───
function addAtt() {
  const name=document.getElementById('nn').value.trim(), id=document.getElementById('ni2').value.trim();
  if(!name||!id){alert('Name and ID are required.');return;}
  if(atts.find(a=>a.id===id)){alert('ID already exists.');return;}
  const s = emptySlots();
  const a={id,name,email:document.getElementById('ne').value.trim(),phone:document.getElementById('np').value.trim(),
    category:document.getElementById('nc').value,added:new Date().toISOString(),...s};
  atts.push(a); lg(id,'ADDED',`${name} registered`); sv(); closeSheet('add'); renderAtt(); showQR(id);
}

// ─── DETAIL ───
function openDet(id) { detId=id; renderDet(); openSheet('detail'); }
function renderDet() {
  const a=atts.find(x=>x.id===detId); if(!a) return;
  const daySection = (dayKey, dayLabel) => {
    const slots = SLOTS[dayKey];
    return `<div class="detail-day-section">
      <div class="detail-day-label">${dayLabel}</div>
      <div class="slot-grid">
        ${slots.map(s=>`
          <div class="slot-tile ${a[s.key]?'done':'pending'}"
            style="background:${a[s.key]?s.bg:'var(--gray-light)'};border-color:${a[s.key]?s.color:'var(--border)'}"
            onclick="toggleSlot('${a.id}','${s.key}')">
            <div class="slot-ico">${s.ico}</div>
            <div class="slot-name" style="color:${a[s.key]?s.color:'var(--muted)'}">${s.label}</div>
            <div class="slot-time" style="color:${a[s.key]?s.color:'var(--muted)'}">${a[s.key]?ft(a[s.key+'_time']):'Pending'}</div>
          </div>`).join('')}
      </div>
    </div>`;
  };
  document.getElementById('det-inner').innerHTML=`
    <div style="display:flex;align-items:center;gap:14px;padding:12px 0 16px;border-bottom:1px solid var(--border)">
      <div class="aava" style="width:52px;height:52px;font-size:18px">${ini(a.name)}</div>
      <div><div style="font-size:18px;font-weight:800">${a.name}</div>
        <div style="font-size:13px;color:var(--muted)">${a.id} · ${a.category}</div>
        <div style="font-size:12px;color:var(--muted);margin-top:2px">${a.email||''} ${a.phone?'· '+a.phone:''}</div>
      </div>
    </div>
    <div style="margin-top:16px">
      ${daySection('d1','📅 Day 1')}
      ${daySection('d2','📅 Day 2')}
      <button class="btn btn-s" style="width:100%;font-size:13px;margin-top:8px" onclick="closeSheet('detail');showQR('${a.id}')">📷 Show / Print QR Code</button>
    </div>`;
}

function toggleSlot(id, key) {
  const a = atts.find(x=>x.id===id); if(!a) return;
  if(a[key]) {
    if(!confirm('Undo this?')) return;
    a[key]=false; a[key+'_time']=null;
    lg(id,'UNDO_'+key.toUpperCase(),'Undone');
  } else {
    a[key]=true; a[key+'_time']=new Date().toISOString();
    lg(id, key.toUpperCase(), 'Manual');
  }
  sv(); renderDet(); renderAtt();
}

// ─── QR ───
function showQR(id) {
  const a=atts.find(x=>x.id===id);if(!a)return;
  document.getElementById('qrname').textContent=a.name;
  document.getElementById('qrsub').textContent=`${a.id} · ${a.category}`;
  const el=document.getElementById('qr-disp'); el.innerHTML='';
  new QRCode(el,{text:a.id,width:220,height:220,colorDark:'#0F6E56',colorLight:'#ffffff',correctLevel:QRCode.CorrectLevel.H});
  openSheet('qr');
}
function printQR() {
  const name=document.getElementById('qrname').textContent, sub=document.getElementById('qrsub').textContent;
  const img=document.getElementById('qr-disp').querySelector('img');
  const w=window.open('','_blank');
  w.document.write(`<html><head><title>QR-${name}</title><style>body{font-family:sans-serif;text-align:center;padding:2rem}h2{color:#0F6E56}</style></head>

  <body><h2>${name}</h2><p>${sub}</p><img src="${img?img.src:''}" width="200"><p style="color:#888;font-size:13px">Physiosetu Conference 2025</p>
  <script>window.onload=()=>window.print()<\/script></body></html>`);
}

// ─── DASHBOARD ───
function setDashDay(d) {
dashDay=d;
[‘dash-d1’,‘dash-d2’,‘dash-all’].forEach((id,i)=>document.getElementById(id).classList.toggle(‘on’,[1,2,0][i]===d));
renderDash();
}
function renderDash() {
const tot=atts.length;
let html=’’;
if(dashDay===0) {
// Overall
const completeAll=atts.filter(isComplete).length;
html+=`<div class="stat-strip"> <div class="stile t"><div class="snum">${tot}</div><div class="slbl">Total Attendees</div></div> <div class="stile g"><div class="snum">${completeAll}</div><div class="slbl">Fully Complete</div></div> </div>`;
html+=’<div class="dcard"><div class="dtitle">📅 Day 1 Progress</div>’+slotBars(SLOTS.d1,tot)+’</div>’;
html+=’<div class="dcard"><div class="dtitle">📅 Day 2 Progress</div>’+slotBars(SLOTS.d2,tot)+’</div>’;
} else {
const daySlots = SLOTS[‘d’+dashDay];
const done = daySlots.map(s=>atts.filter(a=>a[s.key]).length);
const totDone = done.reduce((a,b)=>a+b,0);
html+=`<div class="stat-strip"> <div class="stile t"><div class="snum">${tot}</div><div class="slbl">Attendees</div></div> <div class="stile g"><div class="snum">${atts.filter(a=>daySlots.every(s=>a[s.key])).length}</div><div class="slbl">Day Complete</div></div> ${daySlots.map((s,i)=>`<div class="stile a"><div class="snum">${done[i]}</div><div class="slbl">${s.ico} ${s.label}</div></div>`).join('')} </div>`;
html+=’<div class="dcard"><div class="dtitle">Slot Breakdown</div>’+slotBars(daySlots,tot)+’</div>’;
}
// Category
const cats={};atts.forEach(a=>{cats[a.category]=(cats[a.category]||0)+1;});
const mx=Math.max(…Object.values(cats),1);
html+=`<div class="dcard"><div class="dtitle">By Category</div>${Object.entries(cats).map(([l,v])=>pbar(l,v,mx,'var(--teal-mid)')).join('')}</div>`;
// Export
html+=`<div class="dcard"><div class="dtitle">Export</div> <div class="btn-row"> <button class="btn btn-s" style="font-size:13px" onclick="exportCSV()">📥 CSV</button> <button class="btn btn-s" style="font-size:13px" onclick="printRpt()">🖨️ Print</button> </div></div>`;
document.getElementById(‘dash-content’).innerHTML=html;
}
function slotBars(slots,tot) {
return slots.map(s=>{const v=atts.filter(a=>a[s.key]).length;return pbar(s.ico+’ ‘+s.label,v,tot,s.color);}).join(’’);
}
function pbar(l,v,m,c) {
return `<div class="prow">
<div class="ptop"><span>${l}</span><b>${v}</b></div>
<div class="pbar"><div class="pfill" style="width:${m?Math.round(v/m*100):0}%;background:${c}"></div></div>

  </div>`;
}

// ─── LOG ───
function renderLog() {
const q=(document.getElementById(‘lsrch’)?.value||’’).toLowerCase();
let ls=logs;
if(q) ls=ls.filter(l=>l.attendeeId.toLowerCase().includes(q)||l.note.toLowerCase().includes(q)||l.action.toLowerCase().includes(q));
const el=document.getElementById(‘loglist’);
if(!ls.length){el.innerHTML=’<div class="empty"><div class="empty-ico">📋</div><p>No activity yet</p></div>’;return;}
const slotMap = {};
ALL_SLOTS.forEach(s=>{ slotMap[s.key.toUpperCase()]=s; });
el.innerHTML=ls.map(l=>{
const a=atts.find(x=>x.id===l.attendeeId);
const slot=slotMap[l.action]||null;
return `<div class="lrow"> <div class="lico">${slot?slot.ico:(l.action==='ADDED'?'➕':'↩')}</div> <div class="lbody"> <div class="ltitle">${slot?slot.label:l.action}</div> <div class="lsub">${a?a.name:l.attendeeId} <span style="color:var(--muted)">(${l.attendeeId})</span></div> <div class="ltime">${ft(l.time)}</div> </div> </div>`;
}).join(’’);
}

// ─── EXPORT ───
function exportCSV() {
const h=[‘ID’,‘Name’,‘Category’,‘Email’,‘Phone’,…ALL_SLOTS.map(s=>s.label),…ALL_SLOTS.map(s=>s.label+’ Time’)];
const r=atts.map(a=>[a.id,a.name,a.category,a.email,a.phone,
…ALL_SLOTS.map(s=>a[s.key]?‘Yes’:‘No’),
…ALL_SLOTS.map(s=>a[s.key+’_time’]||’’)
]);
const csv=[h,…r].map(row=>row.map(v=>`"${v}"`).join(’,’)).join(’\n’);
const b=new Blob([csv],{type:‘text/csv’});
const u=URL.createObjectURL(b);
const x=document.createElement(‘a’);x.href=u;x.download=‘physiosetu.csv’;x.click();
}
function printRpt() {
const tot=atts.length;
const w=window.open(’’,’_blank’);
const slotCols=ALL_SLOTS.map(s=>`<th>${s.ico} ${s.label}</th>`).join(’’);
const rows=atts.map(a=>`<tr><td>${a.id}</td><td>${a.name}</td><td>${a.category}</td>${ALL_SLOTS.map(s=>`<td style="text-align:center">${a[s.key]?‘✓’:’’}</td>`).join('')}</tr>`).join(’’);
w.document.write(`<html><head><title>Report</title><style>body{font-family:sans-serif;padding:1.5rem;font-size:12px}table{width:100%;border-collapse:collapse}th,td{border:1px solid #ccc;padding:5px;font-size:11px}th{background:#eee}h1{color:#0F6E56;font-size:16px}</style></head>

  <body><h1>Physiosetu 2025 — Attendance Report</h1><p>Generated: ${new Date().toLocaleString('en-IN')} | Total: ${tot}</p>
  <table><tr><th>ID</th><th>Name</th><th>Category</th>${slotCols}</tr>${rows}</table>
  <script>window.onload=()=>window.print()<\/script></body></html>`);
}

// ─── SHEETS ───
function openSheet(n) {
document.getElementById(‘ovl-’+n).classList.add(‘on’);
requestAnimationFrame(()=>document.getElementById(‘sht-’+n).classList.add(‘on’));
if(n===‘lookup’) setTimeout(()=>document.getElementById(‘lq’).focus(),350);
if(n===‘add’) setTimeout(()=>document.getElementById(‘nn’).focus(),350);
}
function closeSheet(n) {
document.getElementById(‘sht-’+n).classList.remove(‘on’);
setTimeout(()=>document.getElementById(‘ovl-’+n).classList.remove(‘on’),320);
}

// ─── NAV ───
function nav(name, btn) {
document.querySelectorAll(’.pg’).forEach(p=>p.classList.remove(‘on’));
document.querySelectorAll(’.ni’).forEach(b=>b.classList.remove(‘on’));
document.getElementById(‘pg-’+name).classList.add(‘on’);
document.getElementById(‘ni-’+name).classList.add(‘on’);
if(name===‘attendees’) renderAtt();
if(name===‘dashboard’) renderDash();
if(name===‘log’) renderLog();
}

// ─── INIT ───
renderModeBar();
renderAtt();
renderDash();
renderLog();
renderRecent();
</script>

</body>
</html>
